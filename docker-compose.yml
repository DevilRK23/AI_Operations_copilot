version: '3.8'

services:
  copilot-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copilot_ai_app
    ports:
      - "7860:7860"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - JWT_SECRET=${JWT_SECRET:-ai-ops-copilot-jwt-super-secret-key-12345}
    volumes:
      - ./backend/database:/app/backend/database
      - ./backend/vector_db:/app/backend/vector_db
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped
